services:
  tradingagents:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  tradingagents-web:
    build: .
    env_file:
      - .env
    entrypoint: ["python", "-m", "uvicorn", "tradingagents.web.app:app"]
    command: ["--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - tradingagents_web_data:/home/appuser/.tradingagents/web
      - tradingagents_cache:/home/appuser/.tradingagents/cache
      - tradingagents_reports:/home/appuser/.tradingagents/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  tradingagents_web_data:
  tradingagents_cache:
  tradingagents_reports:
  ollama_data:
